      - img "Film o naszym kowalstwie - kujemy balustradę" [ref=e26] [cursor=pointer]
      - heading "Metaloplastyka czy Kowalstwo Artystyczne ?" [level=1] [ref=e27]
      - paragraph [ref=e28]:
        - text: Siła czy finezja, a może jedno i drugie razem?
        - strong [ref=e29]: Kowalstwo artystyczne
        - text: firmy "Iron-Art" jest próbą połączenia obu tych - wydawać by się mogło - zupełnie odrębnych rzemiosł, lecz łączy je, najogólniej rzecz biorąc, słowo… metaloplastyka.
        - text: Inspiruje nas secesja i wszystko, co z nią związane, dlatego często nasze wyroby cechuje nuta Art Nouveau.
        - text: Czy nam się to udało... ? Oceńcie Państwo sami.
      - paragraph [ref=e30]:
        - text: Wykonujemy
        - strong [ref=e31]:
          - link "balustrady kute schodowe wewnętrzne" [ref=e32] [cursor=pointer]:
            - /url: balustrady-kute-wewnetrzne.html
        - text: ", nowoczesne i stylizowane barierki schodowe i balkonowe, drewniano-metalowe pochwyty i poręcze stalowe, a także meble kute do pokoju i przedpokoju."
      - heading "Historia firmy" [level=2] [ref=e33]
      - paragraph [ref=e34]:
        - img "Kowalstwo artystyczne IRON ART Łódź" [ref=e35]
        - text: Historia naszej firmy rozpoczęła się jeszcze przed II wojną światową i sięga aż czterech pokoleń.
      - paragraph [ref=e36]: Wszystko zaczęło się od mojego dziadka, który nauczył się zawodu kowala od swojego wuja, a następnie przekazał tę wiedzę swoim synom.
      - paragraph [ref=e37]:
        - text: Po 40 latach mój ojciec powróciwszy do kowalstwa, otworzył w
        - strong [ref=e38]: Łodzi
        - text: kuźnię, którą obecnie z wielkim zaangażowaniem i pasją prowadzę ja.
      - heading "Kowalstwo artystyczne Łódź - Maciej Kozubal" [level=2] [ref=e39]
      - paragraph [ref=e40]: Zawód metaloplastyka otworzył się przede mną po ukończeniu Państwowego Liceum Sztuk Plastycznych, po którym otrzymałem tytuł Technika Sztuk Plastycznych w zakresie wyrobów artystycznych, ze specjalizacją metaloplastyki. Moim kierunkiem przodującym było kowalstwo artystyczne.
      - paragraph [ref=e41]: W swoją pracę wkładam dużo serca i cierpliwości. Moje wyroby są efektem precyzji, pasji i poświęcenia. Ponadto często wykorzystuję elementy zdobieniowe, dobierane indywidualnie do każdego wyrobu. Dzięki zdobytemu doświadczeniu udało mi się połączyć kowalstwo artystyczne wraz z metaloplastyką kolorową. Swoją pracę traktuje jako hobby, które sprawia mi ogromną radość.
      - heading "Proces tworzenia" [level=2] [ref=e42]
      - paragraph [ref=e43]:
        - text: Na początku tworzenia produktu, przygotowuję projekt wybranego modelu. Skupiam się przede wszystkim na
        - strong [ref=e44]:
          - text: "balustradach: kutych, balustradach schodowych,"
          - link "balustradach wewnętrznych" [ref=e45] [cursor=pointer]:
            - /url: balustrady-kute-wewnetrzne.html
          - text: ", barierkach, barierkach schodowych oraz meblach kutych"
        - text: . Swoje wyroby często oprawiam w kamienie półszlachetne. Ponadto balustrady, barierki i meble posrebrzam, pozłacam lub miedziuję. W zakres mebli kutych wchodzą między innymi ławy, stoliki i stoliczki oraz wieszaki. Moje wyroby nawiązują do architektury okresu secesji oraz ArtDeco, co oznacza, że są one bogato i precyzyjnie zdobione. W swojej twórczości łączę
        - strong [ref=e46]: kowalstwo artystyczne z metaloplastyką
        - text: kolorową w jedną spójną całość.
      - paragraph [ref=e47]: Produktem szczególnie wyjątkowym są balustrady, ponieważ ich duże gabaryty pozwalają dokładnie ukazać piękne zdobienia.
      - paragraph [ref=e48]: Poza artystycznymi wyrobami zajmujemy się także prostszymi pracami, które są uboższe w formie, lecz dostosowane do wymagań i potrzeb indywidualnych. Meble kute, balustrady, wieszaki tworzone pod wymiar dzięki ręcznemu wykonaniu nadają wnętrzom niepowtarzalny klimat.
      - paragraph [ref=e49]:
        - text: Zapraszamy serdecznie do naszej pracowni
        - strong [ref=e50]:
          - link "Kowalstwa Artystycznego Iron-Art Łódź" [ref=e51] [cursor=pointer]:
            - /url: kowalstwo-lodz.html
        - text: . Polecamy zapoznać się z naszymi wyrobami, balustradami kutymi wewnętrznymi i projektami z działu metaloplastyki!
      - paragraph [ref=e52]: Technik Sztuk Plastycznych i Wyrobów Artystycznych, Mistrz Jubiler
      - heading "Unikalne balustrady kute wewnętrzne" [level=2] [ref=e53]
      - paragraph [ref=e54]: Balustrady kute wewnętrzne tworzone ręcznie w naszej pracowni kowalstwa artystycznego w Łodzi, to wyjątkowe dzieła sztuki rzemieślniczej, które łączą w sobie funkcjonalność z estetyką. Ich unikalność tkwi w precyzyjnym wykonaniu i dbałości o detale, które są rezultatem pracy doświadczonego kowala.
      - paragraph [ref=e55]: Każda balustrada schodowa jest jedyna w swoim rodzaju, odzwierciedlając indywidualne gusta i potrzeby klienta. Tradycyjne techniki kowalstwa artystycznego, używane do ich wyrobu produktów, nadają im niepowtarzalny charakter i trwałość, czyniąc je inwestycją na lata.
      - paragraph [ref=e56]: Kute balustrady wewnętrzne dodają wnętrzom elegancji i klasy, stając się centralnym punktem aranżacji, który przyciąga wzrok i zachwyca detalami.
      - paragraph:
        - img "Maciej Kozubal - Kowal Artystyczny" [ref=e57]
      - heading "Kowalstwo Artystyczne - Specyfikacja pracy" [level=2] [ref=e58]
      - list [ref=e59]:
        - listitem [ref=e60]: Nasze wyroby są wykonane w sposób precyzyjny, z uwzględnieniem najdrobniejszych szczegółów. Przykładamy wielką wagę do obróbki łączeń materiałów, aby całość prezentowała się w sposób estetyczny.
        - listitem [ref=e61]:
          - text: Każdy produkt wykonywany w
          - strong [ref=e62]:
            - link "pracowni kowalstwa artystycznego Iron-Art" [ref=e63] [cursor=pointer]:
              - /url: kowalstwo-lodz.html
          - text: ", jest wykuwany ręcznie przez kowala z wieloletnim doświadczeniem w tej dziedzinie oraz wykwalifikowanych pracowników."
        - listitem [ref=e64]: Zapewniamy indywidualne i priorytetowe podejście do każdego zlecenia. Oferujemy także pomoc i doradztwo podczas wyboru projektów, kolorów, materiałów.
        - listitem [ref=e65]: W ramach naszej oferty zapewniamy Klientom możliwość zamówienia odlewanych lub kutych elementów mosiężnych.
        - listitem [ref=e66]: Oferujemy patynowanie stali, zarówno całej powierzchni przedmiotu, jak i tylko delikatnych przetarć na wybranych elementach.
        - listitem [ref=e67]: Pokrywamy stal galwanicznie powłokami niklu, mosiądzu lub chromu, a także srebra lub złota.
        - listitem [ref=e68]: Każdy wyrób zabezpieczamy produktami antykorozyjnymi, dzięki czemu przedłużamy ich żywotność i estetykę.
        - listitem [ref=e69]: Nasze wyroby są cynkowane ogniowo, aby uchronić je przed korozją i zapewnić im efektowny wygląd na długie lata.
        - listitem [ref=e70]: W ramach oferty wykonujemy odlewy z żeliwa, staliwa oraz aluminium.
        - listitem [ref=e71]: Oferujemy możliwość wykorzystania gotowych projektów lub własnego pomysłu. Na życzenie Klienta zapewniamy możliwość przygotowania projektu indywidualnego, dopasowanego do potrzeb i oczekiwań.
        - listitem [ref=e72]: Specjalizujemy się w stylistyce z okresu secesyjnego, art deco, baroku, gotyku, ale zapewniamy możliwość wykorzystania również innych stylów architektonicznych.
        - listitem [ref=e73]: Zapewniamy możliwość zrealizowania nowoczesnych projektów według życzenia Klienta.
